<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Legal policies for Aplus Academy – Terms & Conditions and Privacy Policy." />
  <title>Legal | Aplus Academy</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>" />

  <style>
    /* ========== YOUR EXACT COLOR SCHEME ========== */
    :root {
      --bg: #000;
      --text: #fff;
      --primary: #16e016;
      --primary-dark: #0ca00c;
      --primary-light: #84f084;
      --nav-bg: #121217;
      --card-bg: #1a1a24;
      --border-color: #333;
      --cl-yellow: #f1c40f;
      --shadow: 0 10px 30px rgba(22, 224, 22, 0.2);
      --shadow-lg: 0 20px 40px rgba(22, 224, 22, 0.3);
      --transition: all 0.3s ease;
    }

    body.light {
      --bg: #e5e5c6;
      --text: #222;
      --nav-bg: #e5e5c6;
      --card-bg: #ffffff;
      --border-color: #ddd;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      --shadow-lg: 0 20px 40px rgba(0, 0, 0, 0.15);
    }

    /* ========== GLOBAL RESET & BASE ========== */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      line-height: 1.7;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      transition: background-color 0.3s, color 0.3s;
    }

    a {
      color: var(--primary);
      text-decoration: underline;
      transition: color 0.2s;
    }
    a:hover {
      color: var(--primary-light);
    }

    /* Skip to content (accessibility) */
    .skip-link {
      position: absolute;
      top: -40px;
      left: 0;
      background: var(--primary);
      color: #000;
      padding: 0.5rem 1rem;
      z-index: 1000;
      font-weight: bold;
      text-decoration: none;
    }
    .skip-link:focus {
      top: 0;
    }

    /* ========== HEADER & NAVIGATION ========== */
    .site-header {
      background-color: var(--nav-bg);
      border-bottom: 2px solid var(--primary);
      padding: 1rem 2rem;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      transition: background-color 0.3s;
    }

    .logo {
      font-size: 1.8rem;
      font-weight: bold;
      text-decoration: none;
      color: var(--text);
    }
    .logo span {
      color: var(--primary);
    }

    .nav-links {
      display: flex;
      gap: 1.5rem;
      list-style: none;
      flex-wrap: wrap;
    }

    .nav-links a {
      text-decoration: none;
      font-weight: 500;
      color: var(--text);
      padding-bottom: 2px;
      border-bottom: 2px solid transparent;
      transition: var(--transition);
    }
    .nav-links a:hover,
    .nav-links a.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }

    /* Dark/Light toggle button */
    .theme-toggle {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      color: var(--text);
      padding: 0.5rem 1rem;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      transition: var(--transition);
    }
    .theme-toggle:hover {
      background: var(--primary-dark);
      color: #000;
    }

    /* ========== MAIN LEGAL CONTAINER ========== */
    .legal-container {
      max-width: 850px;
      width: 90%;
      margin: 2rem auto;
      padding: 2rem;
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      box-shadow: var(--shadow);
      flex: 1;
    }

    h1 {
      font-size: 2.2rem;
      color: var(--primary);
      margin-bottom: 0.5rem;
    }

    h2 {
      font-size: 1.4rem;
      margin-top: 2rem;
      margin-bottom: 0.8rem;
      color: var(--primary-light);
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 0.3rem;
    }

    .last-updated {
      color: var(--primary-light);
      font-style: italic;
      margin-bottom: 1.5rem;
      opacity: 0.9;
    }

    .summary {
      background-color: var(--bg);
      border-left: 4px solid var(--primary);
      padding: 1rem 1.5rem;
      margin: 1.5rem 0;
      border-radius: 0 8px 8px 0;
      font-size: 0.95rem;
      box-shadow: inset 0 0 8px rgba(22, 224, 22, 0.1);
    }
    .summary strong {
      display: block;
      margin-bottom: 0.3rem;
      color: var(--primary);
    }

    ul, ol {
      margin: 1rem 0 1.5rem 2rem;
    }
    li {
      margin-bottom: 0.5rem;
    }

    .contact-email {
      background-color: var(--bg);
      padding: 1.2rem;
      border-radius: 8px;
      margin-top: 1.5rem;
      border: 1px solid var(--border-color);
    }

    /* ========== FOOTER ========== */
    .site-footer {
      background-color: var(--nav-bg);
      border-top: 2px solid var(--primary);
      padding: 1.5rem 2rem;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      font-size: 0.9rem;
      color: var(--text);
    }

    .footer-links {
      display: flex;
      gap: 2rem;
    }

    .footer-links a {
      text-decoration: none;
      color: var(--primary-light);
      font-weight: 500;
    }

    .footer-links a.active {
      text-decoration: underline;
      color: var(--primary);
    }

    /* ========== RESPONSIVE ========== */
    @media (max-width: 650px) {
      .site-header {
        flex-direction: column;
        align-items: flex-start;
        gap: 1rem;
      }
      .legal-container {
        margin: 1rem;
        padding: 1.5rem;
      }
      .site-footer {
        flex-direction: column;
        gap: 1rem;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <a class="skip-link" href="#content">Skip to content</a>

  <!-- ===== HEADER ===== -->
  <header class="site-header">
    <a href="#" class="logo" onclick="showPage('home')">Aplus <span>Academy</span></a>
    <nav aria-label="Main navigation">
      <ul class="nav-links">
        <li><a href="#" onclick="showPage('terms')" id="nav-terms">Terms</a></li>
        <li><a href="#" onclick="showPage('privacy')" id="nav-privacy">Privacy</a></li>
        <li><a href="#" onclick="showPage('contact')">Contact</a></li>
      </ul>
    </nav>
    <button class="theme-toggle" id="themeToggle" aria-label="Switch to light mode">☀️ Light Mode</button>
  </header>

  <!-- ===== MAIN CONTENT (DYNAMIC PAGE) ===== -->
  <main id="content" class="legal-container">
    <!-- Page content will be injected by JavaScript -->
  </main>

  <!-- ===== FOOTER ===== -->
  <footer class="site-footer">
    <div>&copy; 2026 Aplus Academy. All rights reserved.</div>
    <div class="footer-links">
      <a href="#" onclick="showPage('terms')" id="footer-terms">Terms</a>
      <a href="#" onclick="showPage('privacy')" id="footer-privacy">Privacy</a>
      <a href="#" onclick="showPage('contact')">Contact</a>
    </div>
  </footer>

  <script>
    // ===== PAGE CONTENT DEFINITIONS =====
    const pages = {
      terms: `
        <h1>Terms and Conditions</h1>
        <p class="last-updated">Last updated: May 2026</p>

        <div class="summary">
          <strong>📌 Quick Summary</strong>
          By using Aplus Academy, you agree to these terms. We provide educational content; please respect our intellectual property and use the site responsibly.
        </div>

        <h2>1. Educational Purpose</h2>
        <p>Aplus Academy offers tutorials, study materials, and academic guidance tailored for Ethiopian university students. All content is intended for educational purposes only and does not guarantee specific academic results.</p>

        <h2>2. User Responsibilities</h2>
        <p>By using this site, you agree to:</p>
        <ul>
          <li>Provide accurate and truthful information when contacting us or subscribing.</li>
          <li>Use the website in a respectful, lawful manner.</li>
          <li>Not copy, redistribute, or sell any paid or proprietary content without written permission.</li>
        </ul>

        <h2>3. Intellectual Property</h2>
        <p>All videos, notes, logos, graphics, and written materials published on Aplus Academy are the property of Aplus Academy unless stated otherwise. Unauthorized reproduction, distribution, or commercial use is strictly prohibited.</p>

        <h2>4. External Links</h2>
        <p>Our website may contain links to third‑party platforms (e.g., YouTube, Telegram). We are not responsible for the content, privacy policies, or practices of any external sites.</p>

        <h2>5. Limitation of Liability</h2>
        <p>While we strive to keep information accurate and up to date, Aplus Academy makes no warranties regarding the completeness, accuracy, or reliability of the content. Your use of the site and its materials is at your own risk.</p>

        <h2>6. Changes to These Terms</h2>
        <p>We reserve the right to modify these terms at any time. Changes will be posted on this page with an updated “Last updated” date. Continued use of the site after changes constitutes acceptance of the new terms.</p>

        <h2>7. Contact Information</h2>
        <div class="contact-email">
          <p>If you have any questions about these Terms, please reach out:</p>
          <p>📧 <a href="mailto:ykifleyohans@gmail.com">ykifleyohans@gmail.com</a></p>
        </div>
      `,

      privacy: `
        <h1>Privacy Policy</h1>
        <p class="last-updated">Last updated: May 2026</p>

        <div class="summary">
          <strong>🔒 Your Privacy Matters</strong>
          We collect minimal data to provide our educational services. We never sell your personal information.
        </div>

        <h2>Information We Collect</h2>
        <ul>
          <li>Name</li>
          <li>Email address</li>
          <li>Messages submitted through forms</li>
          <li>Basic browser and device information</li>
        </ul>

        <h2>How We Use Information</h2>
        <p>We use your information to:</p>
        <ul>
          <li>Provide educational services</li>
          <li>Respond to student questions</li>
          <li>Improve our website and learning resources</li>
          <li>Send important updates when necessary</li>
        </ul>

        <h2>Cookies</h2>
        <p>Our website may use cookies and analytics tools to improve user experience. Third-party services such as Google AdSense and YouTube may also use cookies.</p>

        <h2>Third-Party Services</h2>
        <p>We may use third-party services including:</p>
        <ul>
          <li>YouTube</li>
          <li>Google AdSense</li>
          <li>Telegram</li>
        </ul>
        <p>These services may collect information according to their own privacy policies.</p>

        <h2>Data Protection</h2>
        <p>We do our best to protect your information, but no online platform is completely secure.</p>

        <h2>Children’s Privacy</h2>
        <p>Aplus Academy provides educational content for students. We do not knowingly collect sensitive information from children.</p>

        <h2>Contact Us</h2>
        <div class="contact-email">
          <p>📧 <a href="mailto:ykifleyohans@gmail.com">ykifleyohans@gmail.com</a></p>
        </div>
      `,

      contact: `
        <h1>Contact Us</h1>
        <p>We’d love to hear from you! Reach out via email or join our Telegram channel for updates.</p>
        <div class="contact-email">
          <p>📧 <a href="mailto:ykifleyohans@gmail.com">ykifleyohans@gmail.com</a></p>
          <p>💬 <a href="https://t.me/@aplusacademy11" target="_blank" rel="noopener">Telegram Channel</a></p>
        </div>
      `,

      home: `
        <h1>Welcome to Aplus Academy</h1>
        <p>Your trusted source for university tutorials, study guides, and academic support.</p>
        <p><a href="#" onclick="showPage('terms')">Terms of Service</a> | <a href="#" onclick="showPage('privacy')">Privacy Policy</a></p>
      `
    };

    // ===== PAGE ROUTING =====
    function showPage(pageName) {
      const main = document.getElementById('content');
      main.innerHTML = pages[pageName] || pages.home;

      // Update active nav and footer links
      document.querySelectorAll('.nav-links a, .footer-links a').forEach(link => {
        link.classList.remove('active');
      });
      const navActive = document.getElementById(`nav-${pageName}`);
      const footerActive = document.getElementById(`footer-${pageName}`);
      if (navActive) navActive.classList.add('active');
      if (footerActive) footerActive.classList.add('active');

      // Scroll to top
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // ===== DARK / LIGHT MODE TOGGLE =====
    const themeToggle = document.getElementById('themeToggle');
    themeToggle.addEventListener('click', () => {
      document.body.classList.toggle('light');
      const isLight = document.body.classList.contains('light');
      themeToggle.innerHTML = isLight ? '🌙 Dark Mode' : '☀️ Light Mode';
      themeToggle.setAttribute('aria-label', isLight ? 'Switch to dark mode' : 'Switch to light mode');
    });

    // Load default page (Terms)
    showPage('terms');
  </script>
</body>
</html>
